services:
  syn-gestao:
    image: ghcr.io/synribeiro/syn-gestao:latest
    ports:
      - "8088:80"
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.syn_gestao.entrypoints=websecure"
        - "traefik.http.routers.syn_gestao.rule=Host(`gestao.synribeiro.com.br`)"
        - "traefik.http.routers.syn_gestao.service=syn_gestao"
        - "traefik.http.routers.syn_gestao.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.syn_gestao.loadbalancer.passHostHeader=true"
        - "traefik.http.services.syn_gestao.loadbalancer.server.port=80"

networks:
  network_public:
    external: true
